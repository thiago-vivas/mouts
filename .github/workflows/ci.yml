name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Ambev.DeveloperEvaluation.sln

      - name: Build
        run: dotnet build Ambev.DeveloperEvaluation.sln --configuration Release --no-restore

      - name: Test (unit + integration + functional) with coverage
        run: >-
          dotnet test Ambev.DeveloperEvaluation.sln
          --configuration Release
          --no-build
          --logger "trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage

      - name: Coverage report
        if: always()
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:"coverage/**/coverage.cobertura.xml" \
            -targetdir:"coverage/report" \
            -reporttypes:"TextSummary;Html" \
            -filefilters:"-*Migrations*;-*Designer.cs;-*ModelSnapshot.cs"
          cat coverage/report/Summary.txt

      - name: Upload coverage + test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            src/backend/coverage/**
          if-no-files-found: ignore

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Keeps the job green on branches/PRs that don't include src/frontend yet
      # (job-level conditionals can't use hashFiles, so detect with a shell test).
      - name: Detect frontend
        id: detect
        run: |
          if [ -f src/frontend/package-lock.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node 22
        if: steps.detect.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install
        if: steps.detect.outputs.exists == 'true'
        working-directory: src/frontend
        run: npm ci

      - name: Build
        if: steps.detect.outputs.exists == 'true'
        working-directory: src/frontend
        run: npm run build

      - name: Test
        if: steps.detect.outputs.exists == 'true'
        working-directory: src/frontend
        run: npm test
        env:
          CHROME_BIN: /usr/bin/google-chrome
